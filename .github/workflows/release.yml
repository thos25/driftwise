name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            asset_name: driftwise-windows-amd64.exe
            pyinstaller_args: "--onefile --name driftwise"
          - os: ubuntu-latest
            asset_name: driftwise-linux-amd64
            pyinstaller_args: "--onefile --name driftwise"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build executable
        run: pyinstaller ${{ matrix.pyinstaller_args }} cli/main.py

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv dist/driftwise.exe dist/${{ matrix.asset_name }}

      - name: Rename binary (Linux)
        if: runner.os == 'Linux'
        run: mv dist/driftwise dist/${{ matrix.asset_name }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          generate_release_notes: true
